name: Build

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]

env:
  PYTHONIOENCODING: utf-8

jobs:
  test:
    name: בדיקות ובנייה
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: התקנת תלויות Python
        run: pip install -r requirements.txt

      - name: בניית frontend
        working-directory: frontend
        run: |
          npm ci
          npm run build

      - name: בדיקות עשן (backend)
        run: |
          python _devtest/run_smoke.py
          python _devtest/run_server_test.py

  release-exe:
    name: בניית EXE ופרסום Release
    if: startsWith(github.ref, 'refs/tags/v')
    needs: test
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: התקנת תלויות
        run: pip install -r requirements.txt pyinstaller

      - name: התקנת Tesseract (נארז לתוך ה-EXE)
        run: choco install tesseract -y --no-progress

      - name: אימות כלי אימון (נדרשים לאשף אימון הגופנים)
        shell: pwsh
        run: |
          $dir = "C:\Program Files\Tesseract-OCR"
          foreach ($t in @("tesseract.exe", "lstmtraining.exe", "combine_tessdata.exe")) {
            if (-not (Test-Path "$dir\$t")) { throw "חסר $t בהתקנת Tesseract" }
          }

      - name: בניית frontend
        working-directory: frontend
        run: |
          npm ci
          npm run build

      - name: בניית EXE
        run: pyinstaller hebrew_search.spec --noconfirm --clean

      - name: העלאת artifact
        uses: actions/upload-artifact@v4
        with:
          name: HebrewSearch-exe
          path: dist/HebrewSearch.exe

      - name: פרסום Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/HebrewSearch.exe
          generate_release_notes: true
